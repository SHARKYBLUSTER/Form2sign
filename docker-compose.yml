# =============================================================================
# Form2Sign - Docker Compose Configuration
# =============================================================================

services:
  # Main application service
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: form2sign-app
    ports:
      - "3000:3000"
    volumes:
      # Persistent storage for uploads (includes pdfs subdirectory)
      - ./backend/uploads:/app/backend/uploads
      # Persistent storage for forms
      - ./backend/forms:/app/backend/forms
      # Persistent storage for config
      - ./backend/config:/app/backend/config
    environment:
      - PORT=3000
      - PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true
      - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium-browser
    env_file:
      - ./backend/config/.env
    deploy:
      resources:
        limits:
          memory: 2G
    shm_size: 2g
    restart: unless-stopped
    networks: [proxy]
    


networks:
  proxy:
    external: true

volumes:
  pdf_storage:
    driver: local

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form2Sign - Déconnexion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
    <style>
        .loading-spinner {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .spinner-border {
            width: 3rem;
            height: 3rem;
        }
    </style>
</head>
<body>
    <div class="loading-spinner">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Deconnexion...</span>
        </div>
        <h3 class="mt-4 text-primary">Déconnexion en cours...</h3>
        <p class="text-muted mt-2">Vous allez être redirigé vers la page de connexion.</p>
    </div>
    
    <script>
        // Deconnexion automatique au chargement de la page
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                const response = await fetch('/api/logout', {
                    method: 'GET'
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // Redirection vers la page de connexion
                    window.location.href = '/login.html';
                } else {
                    // Redirection meme si erreur
                    window.location.href = '/login.html';
                }
            } catch (error) {
                console.error('Erreur:', error);
                // Redirection vers la page de connexion
                window.location.href = '/login.html';
            }
        });
        
        // Redirection automatique apres 2 secondes si la requete prend trop de temps
        setTimeout(() => {
            window.location.href = '/login.html';
        }, 2000);
    </script>
</body>
</html>

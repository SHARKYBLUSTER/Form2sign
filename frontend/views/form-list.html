<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Form2Sign - Liste des Formulaires</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
    <!-- Header -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="/form-list.html">
                <i class="fas fa-file-signature me-2"></i>
                Form2Sign
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="/form-list.html">
                            <i class="fas fa-list me-1"></i> Formulaires
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/pdfs.html">
                            <i class="fas fa-file-pdf me-1"></i> Mes PDFs
                        </a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/logout.html" id="logout-btn">
                            <i class="fas fa-sign-out-alt me-1"></i> Deconnexion
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    
    <!-- Main Content -->
    <div class="container-fluid mt-4">
        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h3 class="mb-0">
                            <i class="fas fa-wpforms me-2"></i>
                            Liste des Formulaires
                        </h3>
                    </div>
                    <div class="card-body">
                        <!-- Loading -->
                        <div id="loading-spinner" class="text-center py-5">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">Chargement...</span>
                            </div>
                            <p class="mt-3">Chargement des formulaires...</p>
                        </div>
                        
                        <!-- Error Message -->
                        <div id="error-message" class="alert alert-danger d-none" role="alert"></div>
                        
                        <!-- Form List -->
                        <div id="form-list" class="d-none">
                            <div class="row" id="forms-container">
                                <!-- Les formulaires seront affiches ici -->
                            </div>
                        </div>
                        
                        <!-- Empty State -->
                        <div id="empty-state" class="text-center py-5 d-none">
                            <i class="fas fa-folder-open text-muted fa-3x mb-3"></i>
                            <h4 class="text-muted">Aucun formulaire disponible</h4>
                            <p class="text-muted">
                                Ajoutez des fichiers YAML dans le repertoire <code>backend/forms/</code>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Logout Modal -->
    <div class="modal fade" id="logoutModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-warning">
                    <h5 class="modal-title">
                        <i class="fas fa-exclamation-triangle me-2"></i>
                        Deconnexion
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    Etes-vous sur de vouloir vous deconnecter ?
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
                    <button type="button" class="btn btn-primary" id="confirm-logout">
                        <i class="fas fa-sign-out-alt me-2"></i> Se deconnecter
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Variables globales
        let forms = [];
        
        // Chargement des formulaires au demarrage
        document.addEventListener('DOMContentLoaded', async () => {
            await loadForms();
        });
        
        // Charger la liste des formulaires
        async function loadForms() {
            const loadingSpinner = document.getElementById('loading-spinner');
            const errorMessage = document.getElementById('error-message');
            const formList = document.getElementById('form-list');
            const emptyState = document.getElementById('empty-state');
            const formsContainer = document.getElementById('forms-container');
            
            try {
                const response = await fetch('/api/forms');
                const data = await response.json();
                
                if (data.success && data.forms) {
                    forms = data.forms;
                    
                    if (forms.length === 0) {
                        emptyState.classList.remove('d-none');
                    } else {
                        renderForms(forms);
                        formList.classList.remove('d-none');
                    }
                } else {
                    throw new Error(data.error || 'Impossible de charger les formulaires');
                }
            } catch (error) {
                console.error('Erreur:', error);
                errorMessage.textContent = 'Erreur lors du chargement des formulaires. Veuillez réessayer.';
                errorMessage.classList.remove('d-none');
            } finally {
                loadingSpinner.classList.add('d-none');
            }
        }
        
        // Afficher les formulaires
        function renderForms(forms) {
            const formsContainer = document.getElementById('forms-container');
            formsContainer.innerHTML = '';
            
            forms.forEach(form => {
                const formCard = document.createElement('div');
                formCard.className = 'col-md-6 col-lg-4 mb-4';
                formCard.innerHTML = `
                    <div class="card h-100">
                        <div class="card-body">
                            <h5 class="card-title">
                                <i class="fas fa-file-alt text-primary me-2"></i>
                                ${form.id}
                            </h5>
                            <p class="card-text text-muted">
                                ${form.filename}
                            </p>
                        </div>
                        <div class="card-footer bg-transparent">
                            <a href="/form.html?id=${form.id}" 
                               class="btn btn-primary btn-sm w-100">
                                <i class="fas fa-edit me-2"></i>
                                Remplir
                            </a>
                        </div>
                    </div>
                `;
                formsContainer.appendChild(formCard);
            });
        }
        
        // Deconnexion
        document.getElementById('logout-btn').addEventListener('click', (e) => {
            e.preventDefault();
            const logoutModal = new bootstrap.Modal(document.getElementById('logoutModal'));
            logoutModal.show();
        });
        
        document.getElementById('confirm-logout').addEventListener('click', async () => {
            try {
                const response = await fetch('/api/logout', {
                    method: 'GET'
                });
                const data = await response.json();
                
                if (data.success) {
                    window.location.href = '/login.html';
                }
            } catch (error) {
                console.error('Erreur:', error);
                window.location.href = '/login.html';
            }
        });
    </script>
</body>
</html>

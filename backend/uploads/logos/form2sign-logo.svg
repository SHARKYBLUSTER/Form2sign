<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="400" height="150" viewBox="0 0 400 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c3e50;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fond du logo -->
  <rect x="20" y="20" width="360" height="110" rx="10" ry="10" fill="url(#gradient)" stroke="#2c3e50" stroke-width="2"/>
  
  <!-- Icône document signé -->
  <g transform="translate(50, 40)">
    <!-- Page -->
    <rect x="0" y="0" width="80" height="60" rx="5" ry="5" fill="white" stroke="#2c3e50" stroke-width="2"/>
    
    <!-- Ligne de signature -->
    <line x1="10" y1="45" x2="70" y2="45" stroke="#e74c3c" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Stylo -->
    <path d="M25 25 L35 30 L45 20 L40 25 Z" fill="#f39c12" stroke="#d35400" stroke-width="1"/>
    <rect x="40" y="20" width="3" height="20" fill="#d35400" rx="1.5" ry="1.5"/>
    <circle cx="42" cy="45" r="2" fill="#d35400"/>
  </g>
  
  <!-- Texte Form2Sign -->
  <text x="140" y="55" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="bold" fill="white">
    Form2Sign
  </text>
  
  <!-- Sous-titre -->
  <text x="140" y="85" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#ecf0f1">
    Signature Électronique & PDF Professionnel
  </text>
  
  <!-- Tagline -->
  <text x="140" y="105" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#bdc3c7">
    Solution complète de gestion de formulaires
  </text>
</svg>

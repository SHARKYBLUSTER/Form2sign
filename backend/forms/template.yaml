# =============================================================================
# Form2Sign - Template de Formulaire
# =============================================================================
# Ce fichier est un template pour créer de nouveaux formulaires.
# Copiez ce fichier et renommez-le avec un nom descriptif (ex: contract.yaml)
#
# Structure complète avec support de la personnalisation PDF (Solution 1)
#
# Format :
# - form: metadata du formulaire
#   - id: identifiant unique
#   - title: titre affiché
#   - description: description du formulaire
#   - fields: liste des champs
#     - id: identifiant du champ
#     - label: texte affiché
#     - type: type du champ (text, email, password, date, select, checkbox, textarea, number, radio, file)
#     - required: obligatoire ou non
#     - placeholder: texte d'aide
#     - validation: règle de validation (optionnel)
#     - options: pour les select (liste de paires label/value)
#   - signature: configuration de la signature
#     - required: obligatoire ou non
#     - label: texte affiché
#     - instructions: texte d'aide
#   - style: styles CSS additionnels (optionnel)
#   - pdf: OPTIONS DE PERSONNALISATION PDF (NOUVEAU - Solution 1)
#     - page: configuration de la page
#       - size: taille (A4, A5, Letter, Legal)
#       - orientation: orientation (portrait, landscape)
#       - margins: marges {top, bottom, left, right}
#     - header: en-tête du PDF
#       - logo: chemin vers le logo (relatif à /frontend/public/)
#       - logo_position: position (top-left, top-center, top-right)
#       - logo_width: largeur du logo
#       - logo_height: hauteur du logo
#       - title: titre personnalisé (supporte les variables)
#       - title_font_size: taille de la police du titre
#       - subtitle: sous-titre (optionnel)
#       - subtitle_font_size: taille de la police du sous-titre
#     - introduction: texte d'introduction
#       - text: texte (supporte \n pour sauts de ligne et {variables})
#       - font_size: taille de police
#       - color: couleur du texte (hex ou nom)
#       - spacing_after: nombre de lignes vides après
#     - custom_sections: sections personnalisées (tableau)
#       - type: text, separator, image, spacing
#       - content: contenu (texte, chemin image, etc.)
#       - style: styles (font_size, color, align: left/center/right)
#       - height: hauteur pour les séparateurs
#       - width: largeur pour les séparateurs
#       - spacing_before: espacement avant
#       - spacing_after: espacement après
#     - footer: pied de page
#       - text: texte du pied de page (supporte {pageNumber}, {pageCount}, {date}, etc.)
#       - font_size: taille de police
#       - color: couleur du texte
#       - align: alignement (left, center, right)
#     - spacing: espacements
#       - between_fields: espacement entre les champs
#       - after_header: lignes vides après l'en-tête
#       - before_signature: lignes vides avant la signature
#     - styles: styles globaux
#       - font_family: famille de police par défaut
#       - text_color: couleur de texte par défaut
#       - title_color: couleur du titre
#
# Variables disponibles dans les textes:
#   {full_name}, {date}, {time}, {form_id}, {form_title}, {pageNumber}, {pageCount}
#   {<field_id>} - valeur de n'importe quel champ (ex: {company_name})
#
# Chemins des images:
#   Relatifs à /frontend/public/ (ex: /static/images/logo.png)
# =============================================================================

form:
  # Metadata du formulaire
  id: template
  title: "Template de Formulaire"
  description: "Ceci est un template pour créer de nouveaux formulaires. Modifiez ce fichier selon vos besoins."
  version: "1.0.0"
  
  # Liste des champs du formulaire
  fields:
    # Champ texte simple
    - id: full_name
      label: "Nom complet"
      type: text
      required: true
      placeholder: "Entrez votre nom et prénom"
      validation: null
      
    # Champ email avec validation
    - id: email
      label: "Adresse email"
      type: email
      required: true
      placeholder: "exemple@domaine.com"
      validation: "email"
      
    # Champ mot de passe
    - id: password
      label: "Mot de passe"
      type: password
      required: true
      placeholder: "••••••••"
      validation: "min:8"
      
    # Champ telephone
    - id: phone
      label: "Numéro de téléphone"
      type: tel
      required: false
      placeholder: "+33 1 23 45 67 89"
      validation: "phone"
      
    # Champ date
    - id: birth_date
      label: "Date de naissance"
      type: date
      required: false
      placeholder: null
      validation: null
      
    # Champ select (liste déroulante)
    - id: country
      label: "Pays"
      type: select
      required: true
      placeholder: "Sélectionnez un pays"
      validation: null
      options:
        - label: "France"
          value: "FR"
        - label: "Belgique"
          value: "BE"
        - label: "Suisse"
          value: "CH"
        - label: "Canada"
          value: "CA"
        - label: "Autre"
          value: "OTHER"
      
    # Champ checkbox
    - id: terms_accepted
      label: "J'accepte les conditions générales"
      type: checkbox
      required: true
      placeholder: null
      validation: null
      
    # Champ textarea (texte long)
    - id: comments
      label: "Commentaires"
      type: textarea
      required: false
      placeholder: "Vos commentaires ou questions..."
      validation: null
      rows: 4
      
    # Champ nombre
    - id: age
      label: "Âge"
      type: number
      required: false
      placeholder: "Votre âge"
      validation: "min:18,max:120"
      
    # Champ radio (boutons radio)
    - id: gender
      label: "Genre"
      type: radio
      required: false
      placeholder: null
      validation: null
      options:
        - label: "Homme"
          value: "male"
        - label: "Femme"
          value: "female"
        - label: "Autre"
          value: "other"
      
    # Champ fichier (upload)
    - id: document
      label: "Document à joindre"
      type: file
      required: false
      placeholder: null
      validation: null
      accept: ".pdf,.jpg,.png"
      max_size: 5242880  # 5MB

  # Configuration de la signature
  signature:
    required: true
    label: "Signature"
    instructions: "Signez avec votre doigt ou un stylet sur l'écran tactile."
    
  # Style CSS additionnel pour ce formulaire (optionnel)
  style:
    background_color: "#ffffff"
    text_color: "#333333"
    button_color: "#007bff"
  
  # ============================================================================
  # PERSONNALISATION PDF (Solution 1) - TOUTES LES OPTIONS SONT FACULTATIVES
  # ============================================================================
  # Cette section permet de personnaliser l'apparence du PDF generé.
  # Si cette section est absente, les valeurs par défaut seront utilisées.
  #
  pdf:
    # Configuration de la page
    page:
      size: A4                    # Taille: A4, A5, Letter, Legal
      orientation: portrait       # Orientation: portrait, landscape
      margins:                   # Marges en points (1 point = 1/72 inch)
        top: 50
        bottom: 50
        left: 50
        right: 50
    
    # Configuration de l'en-tête
    header:
      # Logo (chemin relatif à /frontend/public/)
      logo: /static/images/logo.png
      logo_position: top-left    # Position: top-left, top-center, top-right
      logo_width: 100            # Largeur du logo en points
      logo_height: 50            # Hauteur du logo en points
      
      # Titre de l'en-tête (supporte les variables: {full_name}, {form_title}, etc.)
      title: "Contrat - {full_name}"
      title_font_size: 20       # Taille de la police du titre
      title_color: "#000000"    # Couleur du titre (hex ou nom)
      
      # Sous-titre optionnel
      subtitle: "Document à signer électroniquement"
      subtitle_font_size: 12
      subtitle_color: "#666666"
    
    # Texte d'introduction (apparaît après l'en-tête)
    introduction:
      text: |
        Ce document est un contrat entre {company_name} et {full_name}.
        
        Signé le {date} à {time}.
        
        Veuillez remplir tous les champs et signer ci-dessous.
      font_size: 12
      color: "#333333"
      spacing_after: 2          # Nombre de lignes vides après l'introduction
    
    # Sections personnalisées (tableau de sections à insérer avant la signature)
    custom_sections:
      # Section de type texte
      - type: text
        content: "Conditions générales de vente"
        style:
          font_size: 14
          font: Helvetica-Bold
          color: "#000000"
          align: center
        spacing_before: 1
        spacing_after: 1
      
      # Section séparateur
      - type: separator
        color: "#cccccc"
        width: 500
        height: 1
        spacing_before: 0.5
        spacing_after: 1
      
      # Section de texte avec variables
      - type: text
        content: "Entreprise: {company_name}\nEmail: {email}\nDate: {date}"
        style:
          font_size: 10
          color: "#555555"
        spacing_after: 1
      
      # Section espace
      - type: spacing
        lines: 1
    
    # Configuration du pied de page (apparaît sur chaque page)
    footer:
      text: "Page {pageNumber} sur {pageCount} - Document signé électroniquement via Form2Sign - {date}"
      font_size: 8
      color: "#999999"
      align: center
    
    # Espacements globaux
    spacing:
      between_fields: 0.5      # Espacement entre les champs du formulaire
      after_header: 1          # Lignes vides après l'en-tête
      before_signature: 2     # Lignes vides avant la section signature
    
    # Styles globaux (appliqués si non spécifiés ailleurs)
    styles:
      font_family: Helvetica   # Famille de police par défaut
      text_color: "#000000"    # Couleur de texte par défaut
      title_color: "#000000"  # Couleur des titres
    

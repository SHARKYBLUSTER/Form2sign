# =============================================================================
# Form2Sign - Template de Formulaire
# =============================================================================
# Ce fichier est un template pour créer de nouveaux formulaires.
# Copiez ce fichier et renommez-le avec un nom descriptif (ex: contract.yaml)
#
# Format :
# - form: metadata du formulaire
#   - id: identifiant unique
#   - title: titre affiché
#   - description: description du formulaire
#   - fields: liste des champs
#     - id: identifiant du champ
#     - label: texte affiché
#     - type: type du champ (text, email, password, date, select, checkbox, textarea)
#     - required: obligatoire ou non
#     - placeholder: texte d'aide
#     - validation: règle de validation (optionnel)
#     - options: pour les select (liste de paires label/value)
#   - signature: configuration de la signature
#     - required: obligatoire ou non
#     - label: texte affiché
#     - instructions: texte d'aide
# =============================================================================

form:
  # Metadata du formulaire
  id: template_form
  title: "Template de Formulaire"
  description: "Ceci est un template pour créer de nouveaux formulaires. Modifiez ce fichier selon vos besoins."
  version: "1.0.0"
  
  # Liste des champs du formulaire
  fields:
    # Champ texte simple
    - id: full_name
      label: "Nom complet"
      type: text
      required: true
      placeholder: "Entrez votre nom et prénom"
      validation: null
      
    # Champ email avec validation
    - id: email
      label: "Adresse email"
      type: email
      required: true
      placeholder: "exemple@domaine.com"
      validation: "email"
      
    # Champ mot de passe
    - id: password
      label: "Mot de passe"
      type: password
      required: true
      placeholder: "••••••••"
      validation: "min:8"
      
    # Champ telephone
    - id: phone
      label: "Numéro de téléphone"
      type: tel
      required: false
      placeholder: "+33 1 23 45 67 89"
      validation: "phone"
      
    # Champ date
    - id: birth_date
      label: "Date de naissance"
      type: date
      required: false
      placeholder: null
      validation: null
      
    # Champ select (liste déroulante)
    - id: country
      label: "Pays"
      type: select
      required: true
      placeholder: "Sélectionnez un pays"
      validation: null
      options:
        - label: "France"
          value: "FR"
        - label: "Belgique"
          value: "BE"
        - label: "Suisse"
          value: "CH"
        - label: "Canada"
          value: "CA"
        - label: "Autre"
          value: "OTHER"
      
    # Champ checkbox
    - id: terms_accepted
      label: "J'accepte les conditions générales"
      type: checkbox
      required: true
      placeholder: null
      validation: null
      
    # Champ textarea (texte long)
    - id: comments
      label: "Commentaires"
      type: textarea
      required: false
      placeholder: "Vos commentaires ou questions..."
      validation: null
      rows: 4
      
    # Champ nombre
    - id: age
      label: "Âge"
      type: number
      required: false
      placeholder: "Votre âge"
      validation: "min:18,max:120"
      
    # Champ radio (boutons radio)
    - id: gender
      label: "Genre"
      type: radio
      required: false
      placeholder: null
      validation: null
      options:
        - label: "Homme"
          value: "male"
        - label: "Femme"
          value: "female"
        - label: "Autre"
          value: "other"
      
    # Champ fichier (upload)
    - id: document
      label: "Document à joindre"
      type: file
      required: false
      placeholder: null
      validation: null
      accept: ".pdf,.jpg,.png"
      max_size: 5242880  # 5MB

  # Configuration de la signature
  signature:
    required: true
    label: "Signature"
    instructions: "Signez avec votre doigt ou un stylet sur l'écran tactile."
    
  # Style CSS additionnel pour ce formulaire (optionnel)
  style:
    background_color: "#ffffff"
    text_color: "#333333"
    button_color: "#007bff"
    
  # Options de PDF (optionnel)
  pdf:
    title: "Formulaire signé - {full_name}"
    footer: "Généré le {date} à {time}"
    include_timestamp: true
    page_size: "A4"
    orientation: "portrait"

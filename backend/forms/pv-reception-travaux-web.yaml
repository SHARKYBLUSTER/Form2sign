# =============================================================================
# Form2Sign - Procès-Verbal de Réception de Travaux
# =============================================================================
# Template web pour génération de PV de réception via Puppeteer
# Structure optimisée pour la capture web et génération PDF
#
# Pour tester:
# 1. Sélectionnez ce formulaire dans l'interface
# 2. Remplissez tous les champs
# 3. Signez
# 4. Validez pour voir l'aperçu HTML
# 5. Générez le PDF (capture exacte de l'aperçu)
# =============================================================================

form:
  id: pv-reception-travaux-web
  title: "Procès-Verbal de Réception de Travaux"
  description: |
    Document officiel pour la réception des travaux de construction ou rénovation.
    Ce formulaire génère un PV professionnel avec identification du chantier,
    description des travaux, état de réception et signatures des parties.
  version: "2.0.0"

  template:
    style: |
      /* Reset et styles de base */
      * {
        box-sizing: border-box;
      }
      
      body {
        font-family: 'DejaVu Sans', 'Liberation Sans', Helvetica, Arial, sans-serif;
        max-width: 950px;
        margin: 0 auto;
        padding: 30px 40px;
        color: #2c3e50;
        background-color: #ffffff;
        line-height: 1.6;
      }
      
      /* En-tête du document */
      .header {
        text-align: center;
        margin-bottom: 30px;
        padding-bottom: 25px;
        border-bottom: 4px double #1a5276;
      }
      
      .header img {
        max-width: 140px;
        height: 70px;
        object-fit: contain;
        margin-bottom: 15px;
      }
      
      .header h1 {
        margin: 0;
        font-size: 26px;
        font-weight: bold;
        color: #1a5276;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      
      .header .subtitle {
        font-size: 15px;
        color: #566573;
        font-style: italic;
        margin-top: 8px;
      }
      
      /* Bloc d'identification du chantier */
      .chantier-info {
        background-color: #f5f7fa;
        padding: 20px 25px;
        border-radius: 6px;
        margin-bottom: 30px;
        border: 1px solid #dfe6e9;
      }
      
      .chantier-info h2 {
        color: #1a5276;
        margin-top: 0;
        margin-bottom: 18px;
        font-size: 20px;
        border-bottom: 2px solid #3498db;
        padding-bottom: 8px;
      }
      
      .info-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
      }
      
      .info-item {
        margin-bottom: 12px;
      }
      
      .info-label {
        font-weight: 600;
        color: #566573;
        font-size: 14px;
        display: block;
        margin-bottom: 4px;
      }
      
      .info-value {
        color: #2c3e50;
        font-size: 14px;
        background: white;
        padding: 8px 12px;
        border-radius: 4px;
        border: 1px solid #e0e0e0;
      }
      
      /* Sections principales */
      .section {
        margin-bottom: 25px;
      }
      
      .section-title {
        font-size: 18px;
        font-weight: bold;
        color: #1a5276;
        margin-bottom: 12px;
        padding-bottom: 8px;
        border-bottom: 2px solid #3498db;
      }
      
      .section-content {
        padding: 15px;
        background: #fafafa;
        border-radius: 5px;
        border: 1px solid #e8e8e8;
      }
      
      .section-content p {
        margin: 12px 0;
        text-align: justify;
        color: #34495e;
      }
      
      /* Tableau des réserves */
      .reserves-table {
        width: 100%;
        border-collapse: collapse;
        margin: 15px 0;
      }
      
      .reserves-table th {
        background-color: #3498db;
        color: white;
        padding: 10px;
        text-align: left;
        font-weight: 600;
      }
      
      .reserves-table td {
        padding: 10px;
        border: 1px solid #ddd;
        vertical-align: top;
      }
      
      .reserves-table tr:nth-child(even) {
        background-color: #f9f9f9;
      }
      
      /* Séparateurs */
      .separator {
        height: 2px;
        background-color: #3498db;
        width: 600px;
        margin: 15px auto;
      }
      
      /* Zone de signature */
      .signature-section {
        text-align: center;
        padding: 25px;
        margin: 35px 0 25px 0;
        background-color: #f5f7fa;
        border-radius: 8px;
        border: 1px solid #dfe6e9;
      }
      
      .signature-title {
        font-size: 18px;
        font-weight: bold;
        color: #1a5276;
        margin-bottom: 20px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      
      .signature-container {
        width: 300px;
        height: 100px;
        border: 2px dashed #566573;
        margin: 15px auto;
        background: white;
        position: relative;
      }
      
      .signature-container::before {
        content: "Signez ici";
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: #aaa;
        font-size: 14px;
      }
      
      .signature-container img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }
      
      .signatories-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-top: 25px;
      }
      
      .signatory-block {
        text-align: center;
        padding: 15px;
        background: white;
        border-radius: 5px;
        border: 1px solid #e0e0e0;
      }
      
      .signatory-role {
        font-size: 13px;
        font-weight: 600;
        color: #1a5276;
        margin-bottom: 10px;
        text-transform: uppercase;
      }
      
      .signatory-name {
        font-size: 14px;
        color: #2c3e50;
        margin-bottom: 5px;
        font-weight: 500;
      }
      
      .signatory-company {
        font-size: 12px;
        color: #7f8c8d;
        font-style: italic;
        margin-bottom: 10px;
      }
      
      .signatory-date {
        font-size: 11px;
        color: #95a5a6;
        border-top: 1px solid #eee;
        padding-top: 8px;
        margin-top: 8px;
      }
      
      /* Pied de page */
      .footer {
        text-align: center;
        margin-top: 40px;
        padding-top: 20px;
        border-top: 1px solid #dfe6e9;
        font-size: 10px;
        color: #7f8c8d;
      }
      
      /* État de réception */
      .etat-reception {
        text-align: center;
        padding: 15px;
        margin: 20px 0;
        font-size: 16px;
        font-weight: bold;
      }
      
      .etat-conforme {
        background-color: #d4edda;
        color: #155724;
        border: 2px solid #28a745;
        border-radius: 5px;
      }
      
      .etat-avec-reserves {
        background-color: #fff3cd;
        color: #856404;
        border: 2px solid #ffc107;
        border-radius: 5px;
      }
      
      .etat-non-conforme {
        background-color: #f8d7da;
        color: #721c24;
        border: 2px solid #dc3545;
        border-radius: 5px;
      }
      
      /* Responsive */
      @media (max-width: 768px) {
        body {
          padding: 20px 25px;
        }
        
        .header h1 {
          font-size: 20px;
        }
        
        .info-grid {
          grid-template-columns: 1fr;
        }
        
        .signatories-grid {
          grid-template-columns: 1fr;
        }
        
        .signature-container {
          width: 100%;
          height: 80px;
        }
        
        .separator {
          width: 100%;
        }
      }
    
    layout: |
      <div class="header">
        <img src="/static/logos/form2sign-logo.jpg" alt="Logo" />
        <h1>PROCÈS-VERBAL DE RÉCEPTION DE TRAVAUX</h1>
        <p class="subtitle">Document officiel conforme à la réglementation en vigueur</p>
      </div>
      
      <div class="chantier-info">
        <h2>📍 Identification du Chantier</h2>
        <div class="info-grid">
          <div class="info-item">
            <span class="info-label">Référence du PV :</span>
            <span class="info-value">{reference_pv}</span>
          </div>
          <div class="info-item">
            <span class="info-label">Date de réception :</span>
            <span class="info-value">{date_reception}</span>
          </div>
          <div class="info-item">
            <span class="info-label">Adresse du chantier :</span>
            <span class="info-value">{chantier_address}</span>
          </div>
          <div class="info-item">
            <span class="info-label">Ville :</span>
            <span class="info-value">{chantier_city}</span>
          </div>
          <div class="info-item">
            <span class="info-label">Maître d'ouvrage :</span>
            <span class="info-value">{maitre_ouvrage}</span>
          </div>
          <div class="info-item">
            <span class="info-label">Maître d'œuvre :</span>
            <span class="info-value">{maitre_oeuvre}</span>
          </div>
          <div class="info-item">
            <span class="info-label">Entreprise :</span>
            <span class="info-value">{entreprise_nom}</span>
          </div>
          <div class="info-item">
            <span class="info-label">N° Marché :</span>
            <span class="info-value">{numero_marche}</span>
          </div>
        </div>
      </div>
      
      <div class="section">
        <div class="section-title">📋 Objet du Procès-Verbal</div>
        <div class="section-content">
          <p>Le présent procès-verbal a pour objet de constater la réception des travaux exécutés par <strong>{entreprise_nom}</strong> pour le compte de <strong>{maitre_ouvrage}</strong>.</p>
          <p>Les travaux concernent : <strong>{objet_travaux}</strong></p>
        </div>
      </div>
      
      <div class="section">
        <div class="section-title">📝 Description des Travaux Réalisés</div>
        <div class="section-content">
          <p><strong>Nature des travaux :</strong> {nature_travaux}</p>
          <p><strong>Description détaillée :</strong></p>
          <p>{description_travaux}</p>
          <p><strong>Date de début :</strong> {date_debut_travaux} | <strong>Date de fin :</strong> {date_fin_travaux}</p>
        </div>
      </div>
      
      <div class="section">
        <div class="section-title">✅ État de Réception</div>
        <div class="etat-reception {etat_class}">
          {etat_reception}
        </div>
      </div>
      
      <div class="section">
        <div class="section-title">📝 Réserves et Observations</div>
        <div class="section-content">
          <p>{reserves_observations}</p>
          
          <table class="reserves-table">
            <thead>
              <tr>
                <th style="width: 50%;">Description de la réserve</th>
                <th style="width: 30%;">Localisation</th>
                <th style="width: 20%;">Délai de levée</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>{reserve1_description}</td>
                <td>{reserve1_localisation}</td>
                <td>{reserve1_delai}</td>
              </tr>
              <tr>
                <td>{reserve2_description}</td>
                <td>{reserve2_localisation}</td>
                <td>{reserve2_delai}</td>
              </tr>
              <tr>
                <td>{reserve3_description}</td>
                <td>{reserve3_localisation}</td>
                <td>{reserve3_delai}</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
      
      <div class="separator"></div>
      
      <div class="signature-section">
        <div class="signature-title">✍️ Signatures des Parties</div>
        
        <p style="margin-bottom: 20px; color: #566573;">
          Les signataires déclarent avoir pris connaissance du présent procès-verbal
          et acceptent son contenu.
        </p>
        
        <div class="signatories-grid">
          <div class="signatory-block">
            <div class="signatory-role">Maître d'Ouvrage</div>
            <div class="signature-container">
              <img src="{signature_mo}" alt="Signature MO" />
            </div>
            <div class="signatory-name">{nom_mo}</div>
            <div class="signatory-company">{societe_mo}</div>
            <div class="signatory-date">Fait à {ville_signature}, le {date}</div>
          </div>
          
          <div class="signatory-block">
            <div class="signatory-role">Entrepreneur</div>
            <div class="signature-container">
              <img src="{signature_entrepreneur}" alt="Signature Entrepreneur" />
            </div>
            <div class="signatory-name">{nom_entrepreneur}</div>
            <div class="signatory-company">{societe_entrepreneur}</div>
            <div class="signatory-date">Fait à {ville_signature}, le {date}</div>
          </div>
        </div>
      </div>
      
      <div class="footer">
        <p>
          Procès-Verbal n°{reference_pv} - Généré le {date} à {time} | 
          PV de réception de travaux - {form_title} | 
          Page 1/1
        </p>
      </div>

    pdf:
      format: A4
      orientation: portrait
      margin: 40pt

  fields:
    # Identification du PV
    - id: reference_pv
      label: "Référence du PV"
      type: text
      required: true
      placeholder: "Ex: PV-2026-RECEPTION-001"
      validation: null
    
    - id: date_reception
      label: "Date de réception"
      type: date
      required: true
      placeholder: null
      validation: null
    
    # Chantier
    - id: chantier_address
      label: "Adresse du chantier"
      type: textarea
      required: true
      placeholder: "Adresse complète du chantier"
      rows: 3
      validation: null
    
    - id: chantier_city
      label: "Ville"
      type: text
      required: true
      placeholder: "Ville"
      validation: null
    
    # Parties prenantes
    - id: maitre_ouvrage
      label: "Maître d'ouvrage"
      type: text
      required: true
      placeholder: "Nom du maître d'ouvrage"
      validation: null
    
    - id: maitre_oeuvre
      label: "Maître d'œuvre"
      type: text
      required: false
      placeholder: "Nom du maître d'œuvre (si applicable)"
      validation: null
    
    - id: entreprise_nom
      label: "Nom de l'entreprise"
      type: text
      required: true
      placeholder: "Nom de l'entreprise exécutante"
      validation: null
    
    - id: numero_marche
      label: "Numéro de marché"
      type: text
      required: false
      placeholder: "N° de marché ou de contrat"
      validation: null
    
    # Objet des travaux
    - id: objet_travaux
      label: "Objet des travaux"
      type: text
      required: true
      placeholder: "Ex: Construction d'un bâtiment, Rénovation électrique, etc."
      validation: null
    
    - id: nature_travaux
      label: "Nature des travaux"
      type: textarea
      required: true
      placeholder: "Décrivez brièvement la nature des travaux"
      rows: 2
      validation: null
    
    - id: description_travaux
      label: "Description détaillée des travaux"
      type: textarea
      required: true
      placeholder: "Décrivez en détail les travaux réalisés..."
      rows: 5
      validation: null
    
    - id: date_debut_travaux
      label: "Date de début des travaux"
      type: date
      required: true
      placeholder: null
      validation: null
    
    - id: date_fin_travaux
      label: "Date de fin des travaux"
      type: date
      required: true
      placeholder: null
      validation: null
    
    # État de réception
    - id: etat_reception
      label: "État de réception"
      type: select
      required: true
      placeholder: "Sélectionnez l'état"
      validation: null
      options:
        - label: "Conforme sans réserve"
          value: "Conforme sans réserve"
        - label: "Conforme avec réserves"
          value: "Conforme avec réserves"
        - label: "Non conforme"
          value: "Non conforme"
    
    # Réserves
    - id: reserves_observations
      label: "Résumé des réserves et observations"
      type: textarea
      required: false
      placeholder: "Résumé global des réserves et observations..."
      rows: 3
      validation: null
    
    - id: reserve1_description
      label: "Réserve 1 - Description"
      type: text
      required: false
      placeholder: "Description de la première réserve"
      validation: null
    
    - id: reserve1_localisation
      label: "Réserve 1 - Localisation"
      type: text
      required: false
      placeholder: "Où se situe cette réserve ?"
      validation: null
    
    - id: reserve1_delai
      label: "Réserve 1 - Délai de levée"
      type: text
      required: false
      placeholder: "Ex: 15 jours, 1 mois, etc."
      validation: null
    
    - id: reserve2_description
      label: "Réserve 2 - Description"
      type: text
      required: false
      placeholder: "Description de la deuxième réserve"
      validation: null
    
    - id: reserve2_localisation
      label: "Réserve 2 - Localisation"
      type: text
      required: false
      placeholder: "Où se situe cette réserve ?"
      validation: null
    
    - id: reserve2_delai
      label: "Réserve 2 - Délai de levée"
      type: text
      required: false
      placeholder: "Ex: 15 jours, 1 mois, etc."
      validation: null
    
    - id: reserve3_description
      label: "Réserve 3 - Description"
      type: text
      required: false
      placeholder: "Description de la troisième réserve"
      validation: null
    
    - id: reserve3_localisation
      label: "Réserve 3 - Localisation"
      type: text
      required: false
      placeholder: "Où se situe cette réserve ?"
      validation: null
    
    - id: reserve3_delai
      label: "Réserve 3 - Délai de levée"
      type: text
      required: false
      placeholder: "Ex: 15 jours, 1 mois, etc."
      validation: null
    
    # Signataires - Maître d'ouvrage
    - id: nom_mo
      label: "Nom du signataire (Maître d'ouvrage)"
      type: text
      required: true
      placeholder: "Nom et prénom"
      validation: null
    
    - id: societe_mo
      label: "Société (Maître d'ouvrage)"
      type: text
      required: false
      placeholder: "Nom de la société"
      validation: null
    
    # Signataires - Entrepreneur
    - id: nom_entrepreneur
      label: "Nom du signataire (Entrepreneur)"
      type: text
      required: true
      placeholder: "Nom et prénom"
      validation: null
    
    - id: societe_entrepreneur
      label: "Société (Entrepreneur)"
      type: text
      required: false
      placeholder: "Nom de la société"
      validation: null
    
    - id: ville_signature
      label: "Ville de signature"
      type: text
      required: true
      placeholder: "Ville où est signée le PV"
      validation: null

  signature:
    required: true
    label: "Signature"
    instructions: "Signez électroniquement avec votre doigt, stylet ou souris pour valider le procès-verbal."

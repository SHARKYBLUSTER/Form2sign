# =============================================================================
# Form2Sign - Exemple de Formulaire Enrichi
# =============================================================================
# Exemple complet démontrant toutes les fonctionnalités de personnalisation PDF
# Solution 1: Section pdf dans le template YAML
#
# Pour tester:
# 1. Upload votre logo via Configuration > Gestion des Logos
# 2. Utilisez le chemin /static/logos/[nom-du-fichier] dans header.logo
# 3. Remplissez et signez le formulaire
# 4. Téléchargez le PDF généré
#
# Logo par défaut: /static/logos/form2sign-logo.jpg (déjà inclus)
# =============================================================================

form:
  # Metadata du formulaire
  id: contrat-enrichi
  title: "Contrat de Service Enrichi"
  description: |
    Exemple complet démontrant toutes les options de personnalisation PDF.
    Ce formulaire génère un PDF professionnel avec logo, en-tête personnalisé,
    introduction, sections structurées et pied de page avec pagination.
  version: "1.0.0"
  
  # Liste des champs du formulaire
  fields:
    # Informations sur l'entreprise
    - id: company_name
      label: "Nom de l'entreprise"
      type: text
      required: true
      placeholder: "Entrez le nom de votre entreprise"
      validation: null
    
    - id: company_address
      label: "Adresse de l'entreprise"
      type: textarea
      required: true
      placeholder: "Adresse complète de l'entreprise"
      rows: 3
      validation: null
    
    - id: company_siret
      label: "Numéro SIRET"
      type: text
      required: false
      placeholder: "123 456 789 00010"
      validation: null
    
    # Informations sur le client
    - id: client_full_name
      label: "Nom complet du client"
      type: text
      required: true
      placeholder: "Nom et prénom du client"
      validation: null
    
    - id: client_email
      label: "Email du client"
      type: email
      required: true
      placeholder: "client@example.com"
      validation: "email"
    
    - id: client_phone
      label: "Téléphone du client"
      type: tel
      required: false
      placeholder: "+33 1 23 45 67 89"
      validation: "phone"
    
    # Informations sur le contrat
    - id: contract_type
      label: "Type de contrat"
      type: select
      required: true
      placeholder: "Sélectionnez le type de contrat"
      validation: null
      options:
        - label: "Service de maintenance"
          value: "maintenance"
        - label: "Développement logiciel"
          value: "developpement"
        - label: "Consulting"
          value: "consulting"
        - label: "Formation"
          value: "formation"
    
    - id: contract_start_date
      label: "Date de début"
      type: date
      required: true
      placeholder: null
      validation: null
    
    - id: contract_end_date
      label: "Date de fin"
      type: date
      required: false
      placeholder: null
      validation: null
    
    - id: contract_amount
      label: "Montant du contrat (€)"
      type: number
      required: true
      placeholder: "1000"
      validation: "min:0"
    
    - id: contract_description
      label: "Description des services"
      type: textarea
      required: true
      placeholder: "Décrivez les services inclus dans ce contrat..."
      rows: 5
      validation: null
    
    # Conditions générales
    - id: accept_terms
      label: "J'accepte les conditions générales"
      type: checkbox
      required: true
      placeholder: null
      validation: null
    
    - id: special_conditions
      label: "Conditions spéciales"
      type: textarea
      required: false
      placeholder: "Ajoutez ici toute condition spéciale..."
      rows: 3
      validation: null
  
  # Configuration de la signature
  signature:
    required: true
    label: "Signature"
    instructions: "Signez électroniquement avec votre doigt, stylet ou souris."
  
  # Style CSS additionnel pour ce formulaire
  style:
    background_color: "#f8f9fa"
    text_color: "#333333"
    button_color: "#007bff"
  
  # ============================================================================
  # PERSONNALISATION PDF COMPLÈTE
  # ============================================================================
  pdf:
    # Configuration de la page
    page:
      size: A4                    # Format standard A4
      orientation: portrait       # Orientation portrait
      margins:                   # Marges standard
        top: 50
        bottom: 50
        left: 50
        right: 50
    
    # Configuration de l'en-tête avec logo et titre dynamique
    header:
      logo: /static/logos/form2sign-logo.jpg  # Logo par défaut Form2Sign
      logo_position: top-left    # Logo en haut à gauche
      logo_width: 120            # Largeur du logo
      logo_height: 60            # Hauteur du logo
      
      title: "CONTRAT DE SERVICE"
      title_font_size: 24       # Titre plus grand
      title_color: "#2c3e50"    # Bleu foncé professionnel
      
      subtitle: "Entre {company_name} et {client_full_name}"
      subtitle_font_size: 14
      subtitle_color: "#7f8c8d"    # Gris
    
    # Texte d'introduction avec sauts de ligne et variables
    introduction:
      text: |
        Le présent contrat est établi entre :
        
        **{company_name}** (ci-après "le Prestataire")
        dont le siège social est situé à : {company_address}
        
        et
        
        **{client_full_name}** (ci-après "le Client")
        
        Email : {client_email}
        Téléphone : {client_phone}
        
        Ce contrat porte sur : {contract_description}
        
        Signé le {date} à {time}.
      font_size: 11
      color: "#34495e"
      spacing_after: 2          # 2 lignes vides après l'introduction
    
    # Sections personnalisées avant la signature
    custom_sections:
      # =====================================================================
      # ARTICLE 1: OBJET
      # =====================================================================
      - type: text
        content: "ARTICLE 1 - OBJET"
        style:
          font: Helvetica-Bold
          font_size: 16
          color: "#2c3e50"
          align: left
        spacing_before: 1
        spacing_after: 0.5
      
      - type: separator
        color: "#3498db"
        width: 500
        height: 2
        spacing_after: 0.5
      
      - type: text
        content: |
          Le présent contrat a pour objet la fourniture des services suivants :
          
          {contract_description}
          
          Type de contrat : {contract_type}
          Date de début : {contract_start_date}
          Date de fin : {contract_end_date}
          Montant : {contract_amount} €
        style:
          font_size: 11
          color: "#34495e"
        spacing_after: 1
      
      # =====================================================================
      # ARTICLE 2: DURÉE
      # =====================================================================
      - type: text
        content: "ARTICLE 2 - DURÉE"
        style:
          font: Helvetica-Bold
          font_size: 16
          color: "#2c3e50"
          align: left
        spacing_before: 1
        spacing_after: 0.5
      
      - type: separator
        color: "#3498db"
        width: 500
        height: 2
        spacing_after: 0.5
      
      - type: text
        content: |
          Le présent contrat prendra effet à compter du {contract_start_date} et prendra fin
          le {contract_end_date}, sauf résiliation anticipée conformément aux dispositions
          prévues à l'article 5.
        style:
          font_size: 11
          color: "#34495e"
        spacing_after: 1
      
      # =====================================================================
      # ARTICLE 3: OBLIGATIONS DU PRESTATAIRE
      # =====================================================================
      - type: text
        content: "ARTICLE 3 - OBLIGATIONS DU PRESTATAIRE"
        style:
          font: Helvetica-Bold
          font_size: 16
          color: "#2c3e50"
        spacing_before: 1
        spacing_after: 0.5
      
      - type: separator
        color: "#3498db"
        width: 500
        height: 2
        spacing_after: 0.5
      
      - type: text
        content: |
          Le Prestataire s'engage à exécuter les services conformément aux stipulations
          du présent contrat, dans les délais convenus et avec la diligence requise.
        style:
          font_size: 11
          color: "#34495e"
        spacing_after: 1
      
      # =====================================================================
      # ARTICLE 4: OBLIGATIONS DU CLIENT
      # =====================================================================
      - type: text
        content: "ARTICLE 4 - OBLIGATIONS DU CLIENT"
        style:
          font: Helvetica-Bold
          font_size: 16
          color: "#2c3e50"
        spacing_before: 1
        spacing_after: 0.5
      
      - type: separator
        color: "#3498db"
        width: 500
        height: 2
        spacing_after: 0.5
      
      - type: text
        content: |
          Le Client s'engage à fournir au Prestataire toutes les informations et documents
          nécessaires à la bonne exécution des services.
        style:
          font_size: 11
          color: "#34495e"
        spacing_after: 1
      
      # =====================================================================
      # CONDITIONS SPÉCIALES
      # =====================================================================
      - type: text
        content: "CONDITIONS SPÉCIALES"
        style:
          font: Helvetica-Bold
          font_size: 16
          color: "#2c3e50"
        spacing_before: 1
        spacing_after: 0.5
      
      - type: separator
        color: "#e74c3c"
        width: 500
        height: 1
        spacing_after: 0.5
      
      - type: text
        content: "{special_conditions}"
        style:
          font_size: 11
          color: "#c0392b"
          align: justify
        spacing_after: 1
      
      # Espacement final avant la signature
      - type: spacing
        lines: 2
    
    # Configuration du pied de page (apparaît sur chaque page)
    footer:
      text: "Page {pageNumber} sur {pageCount} - Contrat {contract_type} - {form_title} - Généré le {date}"
      font_size: 8
      color: "#95a5a6"
      align: center
    
    # Espacements globaux
    spacing:
      between_fields: 0.8      # Espacement entre les champs
      after_header: 1          # Lignes vides après l'en-tête
      before_signature: 2     # Lignes vides avant la signature
    
    # Styles globaux
    styles:
      font_family: Helvetica   # Famille de police par défaut
      text_color: "#333333"    # Couleur de texte par défaut
      title_color: "#2c3e50"  # Couleur des titres par défaut

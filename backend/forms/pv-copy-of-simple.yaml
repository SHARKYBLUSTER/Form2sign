# Copy of template-simple with different ID
form:
  id: pv-copy-of-simple
  title: "PV Copy Simple"
  description: "Copie de template-simple pour test"
  version: "2.0.0"

  template:
    style: |
      body {
        font-family: Arial, sans-serif;
        max-width: 800px;
        margin: 0 auto;
        padding: 30px;
        color: #333;
        line-height: 1.6;
      }
      
      .header {
        text-align: center;
        margin-bottom: 30px;
      }
      
      .header img {
        max-width: 120px;
        height: auto;
        margin-bottom: 10px;
      }
      
      .header h1 {
        color: #007bff;
        margin-bottom: 5px;
      }
      
      .content {
        background: #f8f9fa;
        padding: 20px;
        border-radius: 8px;
        margin-bottom: 20px;
      }
      
      .field-row {
        margin-bottom: 12px;
      }
      
      .field-label {
        font-weight: bold;
        display: inline-block;
        width: 150px;
        color: #555;
      }
      
      .field-value {
        padding: 8px 12px;
        background: white;
        border: 1px solid #ddd;
        border-radius: 4px;
      }
      
      .signature-area {
        width: 300px;
        height: 100px;
        border: 2px dashed #ccc;
        margin: 20px auto;
        background: white;
        text-align: center;
        line-height: 100px;
        color: #aaa;
      }
      
      .signature-area img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }
      
      .footer {
        text-align: center;
        margin-top: 40px;
        padding-top: 20px;
        border-top: 1px solid #eee;
        font-size: 12px;
        color: #666;
      }
    
    layout: |
      <div class="header">
        <img src="/static/logos/form2sign-logo.jpg" alt="Logo" />
        <h1>{form_title}</h1>
        <p>{form_id} - PV Test</p>
      </div>
      
      <div class="content">
        <h2>Informations</h2>
        
        <div class="field-row">
          <span class="field-label">Nom:</span>
          <span class="field-value">{full_name}</span>
        </div>
        
        <div class="field-row">
          <span class="field-label">Email:</span>
          <span class="field-value">{email}</span>
        </div>
        
        <div class="field-row">
          <span class="field-label">Telephone:</span>
          <span class="field-value">{phone}</span>
        </div>
        
        <div class="field-row">
          <span class="field-label">Adresse:</span>
          <span class="field-value">{address}</span>
        </div>
        
        <div class="field-row">
          <span class="field-label">Date:</span>
          <span class="field-value">{date}</span>
        </div>
      </div>
      
      <div class="signature-area">
        <img src="{signature}" alt="Signature" />
      </div>
      
      <div class="footer">
        <p>PV genere le {date} a {time}</p>
      </div>

    pdf:
      format: A4
      orientation: portrait
      margin: 15mm

  fields:
    - id: full_name
      label: "Nom complet"
      type: text
      required: true
      placeholder: "Votre nom et prenom"
      validation: null

    - id: email
      label: "Email"
      type: email
      required: true
      placeholder: "votre@email.com"
      validation: "email"

    - id: phone
      label: "Telephone"
      type: tel
      required: false
      placeholder: "+33 1 23 45 67 89"
      validation: null

    - id: address
      label: "Adresse"
      type: textarea
      required: false
      placeholder: "Votre adresse"
      rows: 3
      validation: null

  signature:
    required: true
    label: "Signature"
    instructions: "Signez ici"
